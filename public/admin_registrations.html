<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT24 | Registration Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4D00;
            --bg: #0A0A0A;
            --card-bg: #1A1A1A;
            --text: #FFFFFF;
            --text-dim: #A0A0A0;
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF4D00 0%, #FF9000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .signature-img {
            max-width: 150px;
            height: auto;
            background: #fff;
            border-radius: 4px;
            padding: 2px;
            border: 1px solid #ddd;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255, 77, 0, 0.1);
            color: var(--primary);
        }

        .no-data {
            padding: 4rem;
            text-align: center;
            color: var(--text-dim);
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .header { flex-direction: column; text-align: center; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Member Registrations</h1>
        <div class="badge" id="count-badge">0 Total</div>
    </div>

    <div class="container">
        <table id="registrations-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>DOB</th>
                    <th>Address</th>
                    <th>Signature</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
        <div id="no-data-msg" class="no-data" style="display: none;">
            No registrations found.
        </div>
    </div>

    <script>
        async function fetchRegistrations() {
            try {
                const response = await fetch('/api/member-registrations');
                const data = await response.json();
                
                const tableBody = document.getElementById('table-body');
                const countBadge = document.getElementById('count-badge');
                const noDataMsg = document.getElementById('no-data-msg');

                if (data.length === 0) {
                    noDataMsg.style.display = 'block';
                    return;
                }

                countBadge.textContent = `${data.length} Total`;
                
                tableBody.innerHTML = data.map(reg => `
                    <tr>
                        <td style="font-size: 0.9rem; color: var(--text-dim);">
                            ${new Date(reg.created_at).toLocaleDateString()}
                        </td>
                        <td style="font-weight: 600;">${reg.name}</td>
                        <td>${reg.email}</td>
                        <td>
                            <div>P: ${reg.primary_phone}</div>
                            ${reg.secondary_phone ? `<div style="font-size: 0.8rem; color: var(--text-dim);">S: ${reg.secondary_phone}</div>` : ''}
                        </td>
                        <td>${new Date(reg.dob).toLocaleDateString()}</td>
                        <td style="font-size: 0.85rem; max-width: 200px;">${reg.address}</td>
                        <td>
                            ${reg.signature ? `<img src="${reg.signature}" alt="Signature" class="signature-img">` : 'N/A'}
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Error fetching data:', error);
                alert('Failed to load registrations.');
            }
        }

        fetchRegistrations();
    </script>
</body>
</html>
