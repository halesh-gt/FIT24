<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT24 | Member Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --admin-yellow: #fde047;
            --admin-white: #ffffff;
            --admin-bg: #000000;
            --admin-card: #0a0a0a;
            --admin-nav: #080808;
            --admin-text: #ffffff;
            --admin-muted: rgba(255,255,255,0.6);
            --admin-border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--admin-bg);
            color: var(--admin-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(232, 37, 26, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(253, 224, 71, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: var(--admin-card);
            border: 1px solid var(--admin-border);
            border-radius: 24px;
            padding: 4rem;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            /* Filter for better visibility on pure black if needed, but the logo is already distinct */
        }

        .header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .header p {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--admin-yellow);
            font-weight: 800;
            text-shadow: 0 0 20px rgba(253, 224, 71, 0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 800;
            color: var(--admin-white);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1.1rem;
            color: var(--admin-text);
            font-size: 0.9rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--admin-yellow);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 15px rgba(253, 224, 71, 0.05);
        }

        /* Signature Section - Dashbaord Style */
        .signature-section {
            margin-top: 1rem;
        }

        .signature-wrapper {
            background: #fff;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .signature-wrapper:hover {
            border-color: var(--admin-yellow);
        }

        #signature-pad {
            width: 100%;
            height: 160px;
            cursor: crosshair;
            display: block;
        }

        .signature-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            pointer-events: none;
            font-style: italic;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .signature-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.6rem;
        }

        .footer-tag {
            font-size: 0.6rem;
            background: var(--admin-yellow);
            color: #000;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: var(--admin-muted);
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            transition: color 0.3s;
        }

        .clear-btn:hover {
            color: var(--admin-yellow);
        }

        /* Submit Button - Pro Dashbaord Style */
        .submit-btn {
            width: 100%;
            background: var(--admin-yellow);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 1.4rem;
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 2rem;
            clip-path: polygon(15px 0%, 100% 0%, calc(100% - 15px) 100%, 0% 100%);
        }

        .submit-btn:hover {
            background: var(--admin-white);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        /* Success State */
        .success-message {
            display: none;
            text-align: center;
            padding: 5rem 2rem;
            background: var(--admin-card);
            border-radius: 28px;
            border: 1px solid var(--admin-border);
            max-width: 500px;
            width: 100%;
        }

        .success-message h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            color: var(--admin-yellow);
        }

        .success-message p {
            color: var(--admin-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        @media (max-width: 640px) {
            .container { padding: 2.5rem 1.5rem; }
            .form-grid { grid-template-columns: 1fr; gap: 0; }
            .full-width { grid-column: auto; }
        }
    </style>
</head>
<body>
    <div class="container" id="form-container">
        <div class="logo-container">
            <img src="img/logo.png" alt="FIT24 Logo">
        </div>
        <div class="header">
            <p>E l i t e &nbsp; M e m b e r s h i p</p>
        </div>

        <form id="membership-form">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="name">Full Legal Name</label>
                    <input type="text" id="name" name="name" placeholder="JOHN DOE" required>
                </div>

                <div class="form-group full-width">
                    <label for="address">Mailing Address</label>
                    <textarea id="address" name="address" rows="2" placeholder="STREET, CITY, ZIP" required></textarea>
                </div>

                <div class="form-group">
                    <label for="primary_phone">Primary Contact</label>
                    <input type="tel" id="primary_phone" name="primaryPhone" placeholder="+91..." required>
                </div>

                <div class="form-group">
                    <label for="secondary_phone">Emergency Contact</label>
                    <input type="tel" id="secondary_phone" name="secondaryPhone" placeholder="+91...">
                </div>

                <div class="form-group full-width">
                    <label for="email">Email Identifier</label>
                    <input type="email" id="email" name="email" placeholder="ADMIN@FIT24.PRO" required>
                </div>

                <div class="form-group full-width">
                    <label for="dob">Birth Date</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
            </div>

            <div class="form-group signature-section">
                <label>Digital Signature</label>
                <div class="signature-wrapper">
                    <div id="signature-placeholder" class="signature-placeholder">PRO SIGNATURE REQUIRED</div>
                    <canvas id="signature-pad"></canvas>
                </div>
                <div class="signature-footer">
                    <div class="footer-tag">SECURE RECORD</div>
                    <button type="button" class="clear-btn" id="clear-signature">Reset Field</button>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Authorize Registration</button>
        </form>
    </div>

    <div class="success-message" id="success-message">
        <h2>AUTHORIZED</h2>
        <p>Membership record created successfully. Welcome to the elite tier.</p>
        <button class="submit-btn" style="width: auto; padding: 1.25rem 3rem;" onclick="window.location.reload()">NEXT ENTRY</button>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let painting = false;

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startPosition(e) {
            painting = true;
            document.getElementById('signature-placeholder').style.display = 'none';
            const pos = getMousePos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            draw(e);
        }

        function finishedPosition() {
            painting = false;
        }

        function draw(e) {
            if (!painting) return;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000000';

            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseleave', finishedPosition);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); finishedPosition(); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        document.getElementById('clear-signature').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('signature-placeholder').style.display = 'block';
        });

        const form = document.getElementById('membership-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'AUTHORIZING...';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.signature = canvas.toDataURL();

            try {
                const response = await fetch('/api/member-register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                } else {
                    const err = await response.json();
                    alert('AUTH FAILED: ' + err.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Authorize Registration';
                }
            } catch (error) {
                alert('NETWORK FAILURE');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Authorize Registration';
            }
        });
    </script>
</body>
</html>
